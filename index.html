<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SLC Agrícola — Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: Arial, sans-serif; }
    .container {
      background-color: #1B7A2E;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      gap: 36px;
      height: calc(100vh - 6px);
    }
    .divider {
      width: 2px;
      height: 86px;
      background: rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    .slc-title {
      color: #ffffff;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 2px;
      white-space: nowrap;
      font-family: Arial Black, Arial, sans-serif;
    }
    .slc-sub {
      color: #b8e6c4;
      font-size: 17px;
      letter-spacing: 5px;
      margin-top: 4px;
      font-weight: 400;
    }
    .titles h1 {
      color: #ffffff;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .titles p {
      color: #b8e6c4;
      font-size: 18px;
      margin-top: 12px;
      letter-spacing: 0.3px;
    }
    .gold-bar {
      height: 6px;
      background: #C8A84B;
    }
  </style>
</head>
<body>

  <div class="container">

    <div>
      <p class="slc-title">SLC</p>
      <p class="slc-sub">AGRÍCOLA</p>
    </div>

    <div class="divider"></div>

    <div class="titles">
      <h1>Dashboard Monitoramento de Projetos</h1>
      <p>📋 Gestão &nbsp;·&nbsp; 🤖 Automação &nbsp;·&nbsp; 📅 Entregas &nbsp;·&nbsp; ⚠️ Riscos</p>
    </div>

  </div>
  <div class="gold-bar"></div>

</body>
</html>
